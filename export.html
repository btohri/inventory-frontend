<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <style>
    .page-shell {
      width: min(100%, 1320px);
      padding: 28px 24px 56px;
    }
    .export-page {
      max-width: none;
      width: 100%;
      padding: 26px 24px 28px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .filter-grid .full-width {
      grid-column: 1 / -1;
    }
    .filter-grid label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted, #888);
      margin-bottom: 4px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .filter-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }
    .query-button {
      flex: 0 0 220px;
      min-height: 56px;
      padding: 14px 20px;
      border: none;
      border-radius: 16px;
      background: var(--accent, #4f8ef7);
      color: #fff;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .query-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .query-button:not(:disabled):hover { opacity: 0.85; }
    .result-meta {
      font-size: 0.92rem;
      color: var(--text-muted, #888);
      margin-bottom: 12px;
    }
    .preview-wrap {
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.25);
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.34);
    }
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
      min-width: 1080px;
    }
    .preview-table th {
      background: rgba(0,0,0,0.08);
      padding: 12px 12px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
      color: var(--text-muted, #888);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .preview-table td {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.12);
      white-space: nowrap;
      vertical-align: top;
    }
    .preview-table tr:hover td { background: rgba(255,255,255,0.06); }
    .preview-table td.actions-cell {
      white-space: normal;
      min-width: 120px;
    }
    .inline-action {
      min-width: 84px;
      min-height: 40px;
      padding: 10px 12px;
      border: none;
      border-radius: 12px;
      background: rgba(29, 122, 90, 0.16);
      color: var(--accent-strong, #14503c);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .inline-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .edit-row td {
      background: rgba(255, 255, 255, 0.55);
    }
    .edit-form {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 320px));
      gap: 14px 16px;
      width: fit-content;
      max-width: 100%;
      padding: 12px 0 6px;
    }
    .edit-form label {
      display: grid;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted, #888);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .edit-form .full-width {
      grid-column: 1 / -1;
    }
    .edit-form input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid rgba(24, 50, 41, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      font: inherit;
      color: var(--text-main, #183229);
    }
    .edit-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      margin-top: 8px;
    }
    .edit-actions button {
      min-width: 180px;
      width: auto;
    }
    @media (max-width: 1100px) {
      .page-shell {
        width: min(100%, 1080px);
        padding: 24px 18px 48px;
      }
      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .edit-form {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }
    @media (max-width: 520px) {
      .page-shell {
        width: 100%;
        padding: 18px 14px 36px;
      }
      .export-page {
        padding: 20px 14px 22px;
      }
      .filter-grid { grid-template-columns: 1fr; }
      .filter-grid .full-width { grid-column: 1; }
      .edit-form { grid-template-columns: 1fr; }
      .edit-form .full-width { grid-column: 1; }
      .edit-actions { justify-content: stretch; }
      .edit-actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="form-card export-page">
      <div class="panel-title-row">
        <div>
          <p class="section-kicker">Export</p>
          <h3>資料匯出</h3>
        </div>
      </div>

      <p class="export-copy">設定查詢條件後按「查詢」預覽結果，再按「匯出 Excel」下載。</p>

      <div class="filter-grid">
        <div>
          <label>開始日期</label>
          <input type="date" id="filterDateFrom">
        </div>
        <div>
          <label>結束日期</label>
          <input type="date" id="filterDateTo">
        </div>
        <div>
          <label>建立人員</label>
          <input type="text" id="filterPerson" placeholder="全部">
        </div>
        <div>
          <label>料號</label>
          <input type="text" id="filterItemCode" placeholder="全部">
        </div>
      </div>

      <div class="filter-actions">
        <button id="queryButton" class="query-button" type="button">查詢</button>
        <button id="exportButton" class="submit-button" type="button" disabled>匯出 Excel</button>
      </div>

      <p id="result-meta" class="result-meta" hidden></p>

      <div id="preview-wrap" class="preview-wrap" hidden>
        <table class="preview-table">
          <thead>
            <tr>
              <th>時間</th>
              <th>建立人員</th>
              <th>料號</th>
              <th>批次</th>
              <th>數量</th>
              <th>儲位</th>
              <th>輸入方式</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="preview-body"></tbody>
        </table>
      </div>

      <p id="export-message" class="form-message" aria-live="polite"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="./export.js" type="module"></script>
</body>
</html>
