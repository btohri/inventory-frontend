<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Export</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <style>
    .page-shell {
      width: min(100%, 1460px);
      padding: 18px 18px 32px;
    }
    .export-page {
      max-width: none;
      width: 100%;
      padding: 18px 18px 20px;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .filter-grid .full-width {
      grid-column: 1 / -1;
    }
    .filter-grid label {
      display: block;
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--text-muted, #888);
      margin-bottom: 3px;
      line-height: 1.35;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .filter-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .query-button {
      flex: 0 0 148px;
      min-height: 48px;
      padding: 10px 16px;
      border: none;
      border-radius: 14px;
      background: var(--accent, #4f8ef7);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .query-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .query-button:not(:disabled):hover { opacity: 0.85; }
    .result-meta {
      font-size: 0.9rem;
      color: var(--text-muted, #888);
      margin-bottom: 8px;
      line-height: 1.45;
    }
    .preview-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.25);
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.34);
    }
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      table-layout: fixed;
      min-width: 1280px;
    }
    .preview-table th:nth-child(1),
    .preview-table td:nth-child(1) { width: 210px; }
    .preview-table th:nth-child(2),
    .preview-table td:nth-child(2) { width: 82px; }
    .preview-table th:nth-child(3),
    .preview-table td:nth-child(3) { width: 98px; }
    .preview-table th:nth-child(4),
    .preview-table td:nth-child(4) { width: 118px; }
    .preview-table th:nth-child(5),
    .preview-table td:nth-child(5) { width: 132px; }
    .preview-table th:nth-child(6),
    .preview-table td:nth-child(6),
    .preview-table th:nth-child(8),
    .preview-table td:nth-child(8) { width: 96px; }
    .preview-table th:nth-child(7),
    .preview-table td:nth-child(7) { width: 72px; }
    .preview-table th:nth-child(9),
    .preview-table td:nth-child(9) { width: 112px; }
    .preview-table th:nth-child(10),
    .preview-table td:nth-child(10) { width: 86px; }
    .preview-table th:nth-child(11),
    .preview-table td:nth-child(11) { width: 96px; }
    .preview-table th {
      background: rgba(0,0,0,0.08);
      padding: 9px 8px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
      color: var(--text-muted, #888);
      font-size: 0.7rem;
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .preview-table td {
      padding: 8px 8px;
      border-top: 1px solid rgba(255,255,255,0.12);
      white-space: nowrap;
      vertical-align: top;
      line-height: 1.35;
    }
    .preview-table tr:hover td { background: rgba(255,255,255,0.06); }
    .preview-table td.actions-cell {
      white-space: normal;
      min-width: 0;
    }
    .preview-table td.actions-cell .inline-action + .inline-action {
      margin-top: 6px;
    }
    .inline-action {
      min-width: 64px;
      min-height: 32px;
      padding: 6px 10px;
      border: none;
      border-radius: 10px;
      background: rgba(29, 122, 90, 0.16);
      color: var(--accent-strong, #14503c);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
    }
    .danger-inline-action {
      background: rgba(180, 74, 45, 0.14);
      color: #8d3322;
    }
    .inline-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .edit-row td {
      background: rgba(255, 255, 255, 0.55);
    }
    .edit-form {
      display: grid;
      grid-template-columns:
        minmax(96px, 1fr)
        minmax(108px, 1.05fr)
        minmax(108px, 1.05fr)
        minmax(100px, 0.95fr)
        minmax(74px, 0.68fr)
        minmax(92px, 0.78fr)
        minmax(104px, 0.95fr)
        minmax(190px, auto);
      gap: 8px 8px;
      width: 100%;
      max-width: 100%;
      padding: 8px 0 4px;
      align-items: end;
    }
    .edit-form label {
      display: grid;
      gap: 4px;
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--text-muted, #888);
      line-height: 1.35;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .edit-form .location-field {
      min-width: 0;
    }
    .edit-form input {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid rgba(24, 50, 41, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      font: inherit;
      color: var(--text-main, #183229);
    }
    .edit-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-start;
      align-items: center;
      white-space: nowrap;
    }
    .edit-actions button {
      min-width: 82px;
      width: auto;
      padding-left: 10px;
      padding-right: 10px;
    }
    @media (max-width: 1100px) {
      .page-shell {
        width: min(100%, 1080px);
        padding: 18px 14px 32px;
      }
      .filter-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .edit-form {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
      .edit-actions {
        grid-column: 1 / -1;
        margin-top: 8px;
      }
    }
    @media (max-width: 520px) {
      .page-shell {
        width: 100%;
        padding: 14px 10px 24px;
      }
      .export-page {
        padding: 14px 10px 16px;
      }
      .filter-grid { grid-template-columns: 1fr; }
      .filter-grid .full-width { grid-column: 1; }
      .edit-form { grid-template-columns: 1fr; }
      .edit-actions { justify-content: stretch; }
      .edit-actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="form-card export-page">
      <div class="panel-title-row">
        <div>
          <p class="section-kicker">Export</p>
          <h3>資料匯出</h3>
        </div>
      </div>

      <p class="export-copy">設定查詢條件後按「查詢」預覽結果，再按「匯出 Excel」下載。</p>

      <div class="filter-grid">
        <div>
          <label>開始日期</label>
          <input type="date" id="filterDateFrom">
        </div>
        <div>
          <label>結束日期</label>
          <input type="date" id="filterDateTo">
        </div>
        <div>
          <label>建立人員</label>
          <select id="filterPerson">
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label>料號</label>
          <input type="text" id="filterItemCode" placeholder="全部">
        </div>
        <div>
          <label>批次</label>
          <input type="text" id="filterBatchNo" placeholder="全部">
        </div>
        <div>
          <label>廠別</label>
          <select id="filterFactoryType">
            <option value="">全部</option>
            <option value="食品廠">食品廠</option>
            <option value="面膜廠">面膜廠</option>
          </select>
        </div>
      </div>

      <div class="filter-actions">
        <button id="queryButton" class="query-button" type="button">查詢</button>
        <button id="exportButton" class="submit-button" type="button" disabled>匯出 Excel</button>
      </div>

      <p id="result-meta" class="result-meta" hidden></p>

      <div id="preview-wrap" class="preview-wrap" hidden>
        <table class="preview-table">
          <thead>
            <tr>
              <th>時間</th>
              <th>廠別</th>
              <th>建立人員</th>
              <th>料號</th>
              <th>批次</th>
              <th>一桶多少(KG)</th>
              <th>有幾桶</th>
              <th>共多重(KG)</th>
              <th>儲位</th>
              <th>輸入方式</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="preview-body"></tbody>
        </table>
      </div>

      <p id="export-message" class="form-message" aria-live="polite"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="./export.js?v=20260424-1" type="module"></script>
</body>
</html>
