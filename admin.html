<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero-card">
      <div class="hero-topbar">
        <a class="ghost-link" href="./index.html">返回建檔</a>
      </div>
      <p class="eyebrow">Inventory Admin</p>
      <h1>人員管理</h1>
      <p class="hero-copy">
        在這裡新增或刪除建立人員名單，建檔頁會自動讀取這份名單。
      </p>
    </section>

    <section class="form-card">
      <div class="card-header">
        <div>
          <p class="section-kicker">Admin</p>
          <h2>新增建立人員</h2>
        </div>
        <span class="status-chip">同裝置生效</span>
      </div>

      <form id="admin-form" class="inventory-form">
        <label class="field">
          <span>人員姓名</span>
          <input id="personName" name="personName" type="text" maxlength="50" placeholder="例如：王小明" required>
        </label>

        <button class="submit-button" type="submit">新增人員</button>
      </form>

      <p id="admin-message" class="form-message" aria-live="polite"></p>
    </section>

    <section class="form-card">
      <div class="card-header">
        <div>
          <p class="section-kicker">List</p>
          <h2>目前可選名單</h2>
        </div>
      </div>

      <div id="empty-state" class="empty-state" hidden>
        目前尚未建立任何人員，請先新增至少一位。
      </div>

      <div id="person-list" class="person-list"></div>
    </section>
  </main>

  <script src="./admin.js" type="module"></script>
</body>
</html>
