<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page-shell">
    <section id="factory-selection" class="factory-selection">
      <div class="factory-selection-header">
        <p class="section-kicker">Factory</p>
        <h1>選擇廠別</h1>
      </div>

      <div class="factory-choice-grid" aria-label="選擇廠別">
        <button class="factory-choice-button" type="button" data-factory="food">
          <span>食品廠</span>
          <strong>使用原本儲位規則</strong>
        </button>
        <button class="factory-choice-button" type="button" data-factory="mask">
          <span>面膜廠</span>
          <strong>依分類與項目自動帶入規則</strong>
        </button>
      </div>
    </section>

    <section id="inventory-card" class="form-card" hidden>
      <div class="factory-active-bar">
        <div>
          <span>目前廠別</span>
          <strong id="activeFactoryLabel">-</strong>
        </div>
        <button id="changeFactoryButton" class="ghost-button compact-button" type="button">切換</button>
      </div>

      <div class="scanner-panel">
        <div class="panel-title-row">
          <div>
            <p class="section-kicker">QR Scan</p>
            <h3>掃描建檔</h3>
          </div>
        </div>

        <div class="scan-source-switch" role="tablist" aria-label="掃描方式">
          <button
            id="cameraModeButton"
            class="scan-source-button active"
            type="button"
            data-scan-source="camera"
            aria-pressed="true"
          >
            手機相機掃描
          </button>
          <button
            id="hardwareModeButton"
            class="scan-source-button"
            type="button"
            data-scan-source="hardware"
            aria-pressed="false"
          >
            平板掃描槍
          </button>
        </div>

        <div id="camera-scan-panel">
          <div class="scan-actions">
            <button id="startScanButton" class="secondary-button" type="button">開始掃描</button>
            <button id="stopScanButton" class="ghost-button" type="button" disabled>停止掃描</button>
          </div>
          <div id="scan-input-stage" class="scan-input-stage">
            <p id="scanner-status" class="scanner-status">按下開始掃描後，允許相機權限即可使用。</p>
            <label id="hardware-scan-panel" class="field hardware-scan-panel" hidden>
              <span>掃描槍輸入區</span>
              <input
                id="hardwareScanInput"
                type="text"
                inputmode="text"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
                placeholder="點一下這裡後，直接用掃描槍掃入條碼"
              >
            </label>
          </div>
          <div id="qr-reader" class="qr-reader" hidden></div>
        </div>

        <div id="scan-result" class="scan-result" hidden>
          <span>最近一次掃描</span>
          <strong id="scan-result-text">-</strong>
        </div>
        <div id="scan-duplicate-warning" class="scan-duplicate-warning" hidden>
          偵測到連續掃描同一張條碼，這次未自動帶入，請確認是否重複掃描。
        </div>
      </div>

      <form id="inventory-form" class="inventory-form">
        <label class="field created-by-field">
          <span>建立人員</span>
          <input id="createdBy" name="createdBy" type="text" maxlength="50" placeholder="請輸入建立人員" required>
        </label>

        <div class="inline-field-pair scan-hidden-field">
          <label class="field">
            <span>料號</span>
            <input id="itemCode" name="itemCode" type="text" maxlength="100" placeholder="請輸入料號" required>
          </label>

          <label class="field">
            <span>批次</span>
            <input id="batchNo" name="batchNo" type="text" maxlength="100" placeholder="請輸入批次" required>
          </label>
        </div>

        <div class="inline-field-pair scan-hidden-field">
          <label class="field">
            <span>每桶重量（KG）</span>
            <input id="weightPerBucket" name="weightPerBucket" type="number" min="0.01" step="0.01" placeholder="例如 20" required>
          </label>

          <label class="field">
            <span>桶數</span>
            <input id="bucketCount" name="bucketCount" type="number" min="1" step="1" value="1" placeholder="請輸入桶數" required>
          </label>
        </div>

        <label class="field scan-hidden-field">
          <span>總數量（KG）</span>
          <input id="quantity" name="quantity" type="number" min="0.01" step="0.01" placeholder="系統自動計算" readonly required>
        </label>

        <input id="inputMethod" name="inputMethod" type="hidden" value="manual">

        <div class="location-panel scan-hidden-panel">
          <div class="panel-title-row">
            <div>
              <h3>儲位設定</h3>
            </div>
            <div class="location-code-box">
              <span>儲位碼</span>
              <strong id="locationCode">-</strong>
            </div>
          </div>

          <p id="last-location-note" class="last-location-note" hidden></p>

          <div id="mask-rule-panel" class="mask-rule-panel" hidden>
            <p id="maskRuleNote" class="mask-rule-note">請先選擇面膜走道位置，系統會依規則限制樓層與版位。</p>
          </div>

          <div class="select-grid">
            <label class="field">
              <span>溫層</span>
              <select id="tempZone" name="tempZone" required>
                <option value="">請選擇</option>
                <option value="F">F 冷藏</option>
                <option value="G">G 冷凍</option>
              </select>
            </label>

            <label class="field">
              <span>走道位置</span>
              <select id="aisle" name="aisle" required></select>
            </label>

            <label class="field">
              <span>樓層</span>
              <select id="level" name="level" required></select>
            </label>

            <label class="field">
              <span>版位</span>
              <select id="position" name="position" required></select>
            </label>
          </div>
        </div>
        <textarea id="rawQr" name="rawQr" rows="3" hidden></textarea>

        <button id="submitButton" class="submit-button" type="submit">送出建檔</button>
      </form>

      <p id="form-message" class="form-message" aria-live="polite"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="./app.js?v=20260424-2"></script>
</body>
</html>
